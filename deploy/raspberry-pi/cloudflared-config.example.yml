# Install: sudo cp cloudflared-config.example.yml /etc/cloudflared/config.yml
# Replace TUNNEL_UUID, credentials path, and hostname after: cloudflared tunnel create oer-api
tunnel: TUNNEL_UUID
credentials-file: /etc/cloudflared/TUNNEL_UUID.json

ingress:
  - hostname: api.example.com
    service: http://127.0.0.1:8000
  - service: http_status:404
